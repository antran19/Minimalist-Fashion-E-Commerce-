<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block th:insert="~{fragments/head :: head('Sign In | U-Minimalist', 'Sign in to your U-Minimalist account.')}">
    </th:block>
    <style>
        .auth-container {
            min-height: calc(100vh - 72px - 240px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-block: 120px 60px;
            background-color: var(--page);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .auth-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }

        .auth-card p.subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.78rem;
            font-weight: 760;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .form-control-custom {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            background-color: #ffffff;
            transition: border-color 150ms ease;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--ink);
        }

        .auth-btn {
            width: 100%;
            min-height: 48px;
            background: var(--ink);
            border: 1px solid var(--ink);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 150ms ease, border-color 150ms ease, transform 100ms ease;
        }

        .auth-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        .auth-alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .alert-error {
            background-color: #fff5f5;
            border: 1px solid #ffc9c9;
            color: var(--accent);
        }

        .alert-success {
            background-color: #f4fbf7;
            border: 1px solid #c3ebd6;
            color: #1b854d;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 500;
        }

        .auth-switch a {
            color: var(--ink);
            font-weight: 700;
            border-bottom: 1px solid var(--ink);
        }

        .auth-switch a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <th:block th:replace="~{fragments/navbar :: navbar('login', 'site-header is-scrolled', '', true, false, true)}">
    </th:block>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Please enter your details to sign in.</p>

            <div th:if="${errorMessage}" class="auth-alert alert-error" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="auth-alert alert-success" th:text="${successMessage}"></div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control-custom"
                        placeholder="name@domain.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control-custom"
                        placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-switch">
                Don't have an account? <a th:href="@{/register}">Create account</a>
            </div>

            <!-- Quick Login Buttons for Testing -->
            <div style="display: flex; gap: 10px; margin-top: 24px;">
                <button type="button" onclick="fillLogin('admin@uminimalist.com', 'admin123')"
                    style="flex: 1; padding: 8px; border: 1px solid var(--line); background: #f9f9f9; cursor: pointer; border-radius: 4px; font-weight: 600; font-size: 0.85rem;">Admin</button>
                <button type="button" onclick="fillLogin('customer@uminimalist.com', 'customer123')"
                    style="flex: 1; padding: 8px; border: 1px solid var(--line); background: #f9f9f9; cursor: pointer; border-radius: 4px; font-weight: 600; font-size: 0.85rem;">Customer</button>
            </div>
            <script>
                function fillLogin(email, password) {
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = password;
                }
            </script>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer(false)}"></th:block>
<script>
    (function () {
        var form = document.querySelector('form[action*="/login"]');
        var emailInput = document.getElementById('email');
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

        function showError(msg) {
            var existing = document.getElementById('client-error');
            if (existing) existing.remove();
            var div = document.createElement('div');
            div.id = 'client-error';
            div.className = 'auth-alert alert-error';
            div.textContent = msg;
            form.parentNode.insertBefore(div, form);
        }

        form.addEventListener('submit', function (e) {
            var email = emailInput.value.trim();
            if (!emailRegex.test(email)) {
                e.preventDefault();
                showError('Email không hợp lệ. Vui lòng nhập đúng định dạng, ví dụ: name@domain.com');
                emailInput.focus();
                return;
            }
            var existing = document.getElementById('client-error');
            if (existing) existing.remove();
        });
    })();
</script>
    <th:block th:replace="~{fragments/scripts :: scripts(false)}"></th:block>
</body>

</html>
