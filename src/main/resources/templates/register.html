<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:insert="~{fragments/head :: head('Create Account | U-Minimalist', 'Create a new U-Minimalist customer account.')}"></th:block>
    <style>
        .auth-container {
            min-height: calc(100vh - 72px - 240px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-block: 120px 60px;
            background-color: var(--page);
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 40px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .auth-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .auth-card p.subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.78rem;
            font-weight: 760;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--ink);
        }
        .form-control-custom {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            background-color: #ffffff;
            transition: border-color 150ms ease;
        }
        .form-control-custom:focus {
            outline: none;
            border-color: var(--ink);
        }
        .field-error {
            display: block;
            margin-top: 6px;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 650;
        }
        .auth-btn {
            width: 100%;
            min-height: 48px;
            background: var(--ink);
            border: 1px solid var(--ink);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 150ms ease, border-color 150ms ease, transform 100ms ease;
        }
        .auth-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        .auth-btn:active {
            transform: scale(0.98);
        }
        .auth-alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .alert-error {
            background-color: #fff5f5;
            border: 1px solid #ffc9c9;
            color: var(--accent);
        }
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 500;
        }
        .auth-switch a {
            color: var(--ink);
            font-weight: 700;
            border-bottom: 1px solid var(--ink);
        }
        .auth-switch a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/navbar :: navbar('register', 'site-header is-scrolled', '', true, false, true)}"></th:block>

<main class="auth-container">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join U-Minimalist for a simpler shopping routine.</p>

        <div th:if="${errorMessage}" class="auth-alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" th:field="*{fullName}" class="form-control-custom" placeholder="John Doe" required autofocus>
                <small class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Full name is required.</small>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" th:field="*{email}" class="form-control-custom" placeholder="name@domain.com" required>
                <small class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Enter a valid email address.</small>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" th:field="*{phone}" class="form-control-custom" placeholder="0912345678"
                       pattern="^(0|\+?84)(3[2-9]|5[25689]|7[06-9]|8[1-9]|9[0-46-9])[0-9]{7}$"
                       minlength="10" maxlength="12"
                       oninput="this.value = this.value.replace(/[\s.\-()]/g, '')" required>
                <small class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Enter a valid phone number.</small>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" class="form-control-custom" placeholder="At least 8 characters" required>
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password must be at least 8 characters.</small>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control-custom" placeholder="Repeat password" required>
                <small class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirm password is required.</small>
            </div>
            <button type="submit" class="auth-btn">Register</button>
        </form>

        <div class="auth-switch">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/footer :: footer(false)}"></th:block>
<th:block th:replace="~{fragments/scripts :: scripts(false)}"></th:block>
</body>
</html>
