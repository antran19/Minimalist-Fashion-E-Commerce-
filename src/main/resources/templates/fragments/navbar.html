<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<th:block th:fragment="navbar(activePage, headerClass, dataAnimate, toggler, collapseShow, showSearch)">
    <header th:class="${headerClass}" th:attr="data-animate=${dataAnimate}">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid page-shell">
                <a class="navbar-brand" th:href="@{/}" aria-label="U-Minimalist home">U-Minimalist</a>
                <th:block th:if="${toggler}">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                            aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </th:block>
                <div th:class="'collapse navbar-collapse' + (${collapseShow} ? ' show' : '')" id="mainNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products(collection='men')}" th:classappend="${activePage == 'products' and selectedCollection == 'men'} ? 'active' : ''">Men</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products(collection='women')}" th:classappend="${activePage == 'products' and selectedCollection == 'women'} ? 'active' : ''">Women</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products(collection='kids')}" th:classappend="${activePage == 'products' and selectedCollection == 'kids'} ? 'active' : ''">Kids</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products(sort='new')}" th:classappend="${activePage == 'products' and selectedSort == 'new'} ? 'active' : ''">New arrivals</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/products(sort='best')}" th:classappend="${activePage == 'products' and selectedSort == 'best'} ? 'active' : ''">Best sellers</a>
                        </li>
                        <!-- Checkout link (only shown on checkout page) -->
                        <li class="nav-item" th:if="${activePage == 'checkout'}">
                            <a class="nav-link active" th:href="@{/checkout}">Checkout</a>
                        </li>
                        <!-- Search link -->
                        <li class="nav-item" th:if="${showSearch}">
                            <a class="nav-link" th:href="@{/products}"
                               th:classappend="${activePage == 'products' and selectedCollection == null and selectedSort == null} ? 'active'"
                               th:attr="aria-current=${activePage == 'products' and selectedCollection == null and selectedSort == null ? 'page' : ''}"
                               aria-label="Search products">Search</a>
                        </li>
                        <!-- Cart (hidden for admins - they cannot place orders) -->
                        <li class="nav-item" sec:authorize="!hasRole('ADMIN')">
                            <a class="nav-link cart-link" th:href="@{/cart}" aria-label="View cart"
                               th:classappend="${activePage == 'cart'} ? 'active'"
                               th:attr="aria-current=${activePage == 'cart' ? 'page' : ''}">
                                Cart <span th:text="${cartCount}">0</span>
                            </a>
                        </li>
                        <!-- Anonymous Account -->
                        <li class="nav-item" sec:authorize="isAnonymous()">
                            <a class="nav-link" th:href="@{/login}" aria-label="Sign in"
                               th:classappend="${activePage == 'login' || activePage == 'register'} ? 'active'">Account</a>
                        </li>
                        <!-- Authenticated Customer Account -->
                        <li class="nav-item" sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/account}" aria-label="Account"
                               th:classappend="${activePage == 'account'} ? 'active'">Account</a>
                        </li>
                        <!-- Admin -->
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/admin/dashboard}" aria-label="Admin Dashboard"
                               th:classappend="${activePage == 'admin'} ? 'active'">Admin</a>
                        </li>
                    </ul>
                    <!-- Sign out – floated to the right -->
                    <div class="ms-lg-auto" sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                    style="display: inline-flex; align-items: center; gap: 6px; background: none; border: 1.5px solid #dc3545; color: #dc3545; font-weight: 700; font-size: 0.85rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 150ms ease;"
                                    onmouseover="this.style.background='#dc3545'; this.style.color='#fff';"
                                    onmouseout="this.style.background='none'; this.style.color='#dc3545';">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
                                    <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
                                </svg>
                                Sign out
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</th:block>
</html>
